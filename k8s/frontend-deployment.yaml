apiVersion: v1
kind: Namespace
metadata:
  name: dgkj
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dgkj-admin-config
  namespace: dgkj
data:
  VITE_GLOB_API_URL: "https://api.dgkjpay.com"
  VITE_USE_MOCK: "false"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: dgkj-admin
  namespace: dgkj
  labels:
    app: dgkj-admin
spec:
  replicas: 2
  selector:
    matchLabels:
      app: dgkj-admin
  template:
    metadata:
      labels:
        app: dgkj-admin
    spec:
      containers:
      - name: dgkj-admin
        image: dgkj/admin:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "256Mi"
            cpu: "200m"
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 5
          periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: dgkj-admin-service
  namespace: dgkj
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 80
  selector:
    app: dgkj-admin
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: dgkj-ingress
  namespace: dgkj
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - dghs.gddogootech.com
    secretName: dgkj-tls-secret
  rules:
  - host: dghs.gddogootech.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: dgkj-admin-service
            port:
              number: 80
      - path: /basic-api
        pathType: Prefix
        backend:
          service:
            name: dgkj-server-service
            port:
              number: 3000
      - path: /api/v1
        pathType: Prefix
        backend:
          service:
            name: dgkj-server-service
            port:
              number: 3000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: dgkj-admin-hpa
  namespace: dgkj
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: dgkj-admin
  minReplicas: 2
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
