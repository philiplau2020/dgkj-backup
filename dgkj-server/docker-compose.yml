version: '3.8'

services:
  dgkj-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dgkj-server
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/dgkj?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=dgkj123456
    volumes:
      - ./logs:/app/logs
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - dgkj-network
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: dgkj-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=dgkj123456
      - MYSQL_DATABASE=dgkj
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - dgkj-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

networks:
  dgkj-network:
    driver: bridge

volumes:
  mysql-data:
