name: Deploy to Server

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'pnpm'

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Get dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
        run: |
          # Set production API URL
          sed -i "s|VITE_API_BASE_URL=.*|VITE_API_BASE_URL=http://120.78.7.180:8080|g" ./.env.production
          sed -i "s|VITE_USE_MOCK=.*|VITE_USE_MOCK=false|g" ./.env.production
          cat .env.production
          pnpm build

      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            # 创建部署目录
            mkdir -p /var/www/merchant
            
            # 停止旧进程
            pkill -f dgkj-server.jar || true
            
            # 上传前端文件
            echo "部署前端文件..."
            
            # 清理旧文件
            rm -rf /var/www/merchant/*
            
            # 复制新文件
            cp -r ./dist/* /var/www/merchant/
            
            # 配置 Nginx
            cat > /etc/nginx/sites-available/merchant.gddogootech.com << 'NGINX'
            server {
                listen 80;
                server_name merchant.gddogootech.com;
                root /var/www/merchant;
                index index.html;
                
                location / {
                    try_files $uri $uri/ /index.html;
                }
                
                location /api {
                    proxy_pass http://127.0.0.1:8080;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                }
            }
            NGINX
            
            # 启用站点
            ln -sf /etc/nginx/sites-available/merchant.gddogootech.com /etc/nginx/sites-enabled/
            
            # 测试并重启 Nginx
            nginx -t && systemctl reload nginx
            
            echo "部署完成!"
            curl -s http://localhost:8080/api/auth/userinfo
