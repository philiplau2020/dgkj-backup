name: Deploy to Cloud Server

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment'
        required: true
        default: 'production'
        type: choice
        options:
          - production
          - staging
  push:
    branches:
      - main
    paths:
      - 'src/**'
      - 'server/**'
      - '!**/*.md'
      - '!.vscode/**'

jobs:
  deploy-backend:
    name: Deploy Backend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Server Known Host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install Backend Dependencies
        working-directory: ./server
        run: npm ci

      - name: Build Backend
        working-directory: ./server
        run: npm run build

      - name: Prepare Backend Environment
        run: |
          cp server/.env.production server/.env
          sed -i "s/DB_PASSWORD=.*/DB_PASSWORD=${{ secrets.DB_PASSWORD }}/g" server/.env
          sed -i "s/JWT_SECRET=.*/JWT_SECRET=${{ secrets.JWT_SECRET }}/g" server/.env
          sed -i "s/CORS_ORIGIN=.*/CORS_ORIGIN=https:\/\/dghs.gddogootech.com/g" server/.env

      - name: Upload Backend to Server
        run: |
          rsync -avz --delete \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='dist' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./server/ \
            root@${{ secrets.SERVER_HOST }}:/opt/dgkj-server/

      - name: Install Production Dependencies on Server
        run: |
          ssh root@${{ secrets.SERVER_HOST }} "
            cd /opt/dgkj-server &&
            npm ci --omit=dev &&
            npm run build
          "

      - name: Setup PM2 on Server
        run: |
          ssh root@${{ secrets.SERVER_HOST }} "
            cd /opt/dgkj-server &&
            npm install -g pm2 &&
            pm2 delete dgkj-server || true &&
            pm2 start ecosystem.config.js &&
            pm2 save
          "

      - name: Setup PM2 on Server
        run: |
          ssh root@${{ secrets.SERVER_HOST }} "
            cd /opt/dgkj-server &&
            npm install -g pm2 &&
            pm2 delete dgkj-server || true &&
            pm2 start ecosystem.config.js &&
            pm2 save
          "

      - name: Update Nginx Config for Node.js Backend
        run: |
          ssh root@${{ secrets.SERVER_HOST }} "
            cp /opt/dgkj-server/scripts/nginx-dghs-prod.conf /etc/nginx/sites-available/dghs.gddogootech.com.conf 2>/dev/null || true
            ln -sf /etc/nginx/sites-available/dghs.gddogootech.com.conf /etc/nginx/sites-enabled/ 2>/dev/null || true
            # 如果上面的方法不行，直接替换
            cat > /etc/nginx/sites-enabled/dghs.gddogootech.com.conf << 'NGINX_EOF'
server {
    listen 80;
    server_name dghs.gddogootech.com;
    return 301 https://\$server_name\$request_uri;
}
server {
    listen 443 ssl http2;
    server_name dghs.gddogootech.com;
    root /www/dgkj/admin;
    index index.html;
    ssl_certificate /etc/letsencrypt/live/dghs.gddogootech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dghs.gddogootech.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    location / {
        try_files \$uri \$uri/ /index.html;
    }
    location /basic-api/ {
        proxy_pass http://127.0.0.1:3000/basic-api/;
        proxy_http_version 1.1;
        proxy_set_header Host \$host;
        proxy_set_header X-Real-IP \$remote_addr;
        proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto \$scheme;
        proxy_set_header Connection '';
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    location /api-docs/ {
        proxy_pass http://127.0.0.1:3000/api-docs/;
        proxy_http_version 1.1;
        proxy_set_header Host \$host;
    }
    location /upload/ {
        proxy_pass http://127.0.0.1:3000/upload/;
        proxy_http_version 1.1;
        proxy_set_header Host \$host;
        client_max_body_size 100M;
    }
    access_log /var/log/nginx/dgkj-admin.access.log;
    error_log /var/log/nginx/dgkj-admin.error.log;
}
NGINX_EOF
            # 清理旧的默认配置
            rm -f /etc/nginx/sites-enabled/default 2>/dev/null || true
            # 测试并重载 Nginx
            nginx -t && systemctl reload nginx && echo 'Nginx reloaded successfully' || echo 'Nginx config test failed'
          "

      - name: Wait for Backend to Start
        run: sleep 5

      - name: Check Backend Status
        run: |
          ssh root@${{ secrets.SERVER_HOST }} "pm2 status"

  deploy-frontend:
    name: Deploy Frontend - Admin
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Server Known Host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Configure Environment
        run: |
          sed -i 's|VITE_GLOB_API_URL=.*|VITE_GLOB_API_URL=/basic-api|g' .env.production
          sed -i 's|VITE_USE_MOCK=.*|VITE_USE_MOCK=false|g' .env.production

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Admin Frontend
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
        run: pnpm build:admin

      - name: Upload Admin to Server
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./admin/dist/ \
            root@${{ secrets.SERVER_HOST }}:/www/dgkj/admin/

  deploy-agent-frontend:
    name: Deploy Frontend - Agent
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Server Known Host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Configure Environment
        run: |
          sed -i 's|VITE_GLOB_API_URL=.*|VITE_GLOB_API_URL=/basic-api|g' .env.production
          sed -i 's|VITE_USE_MOCK=.*|VITE_USE_MOCK=false|g' .env.production

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Agent Frontend
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
        run: pnpm build:agent

      - name: Upload Agent to Server
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./agent/dist/ \
            root@${{ secrets.SERVER_HOST }}:/www/dgkj/agent/

  deploy-merchant-frontend:
    name: Deploy Frontend - Merchant
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Server Known Host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Configure Environment
        run: |
          sed -i 's|VITE_GLOB_API_URL=.*|VITE_GLOB_API_URL=/basic-api|g' .env.production
          sed -i 's|VITE_USE_MOCK=.*|VITE_USE_MOCK=false|g' .env.production

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Merchant Frontend
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
        run: pnpm build:merchant

      - name: Upload Merchant to Server
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./merchant/dist/ \
            root@${{ secrets.SERVER_HOST }}:/www/dgkj/merchant/

  deploy-member-frontend:
    name: Deploy Frontend - Member
    runs-on: ubuntu-latest
    needs: deploy-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'pnpm'
          cache-dependency-path: pnpm-lock.yaml

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add Server Known Host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Configure Environment
        run: |
          sed -i 's|VITE_GLOB_API_URL=.*|VITE_GLOB_API_URL=/basic-api|g' .env.production
          sed -i 's|VITE_USE_MOCK=.*|VITE_USE_MOCK=false|g' .env.production

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build Member Frontend
        env:
          NODE_OPTIONS: '--max_old_space_size=4096'
        run: pnpm build:member

      - name: Upload Member to Server
        run: |
          rsync -avz --delete \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./member/dist/ \
            root@${{ secrets.SERVER_HOST }}:/www/dgkj/member/

  verify-deployment:
    name: Verify Deployment
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend, deploy-agent-frontend, deploy-merchant-frontend, deploy-member-frontend]
    steps:
      - name: Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Verify Services
        run: |
          ssh root@${{ secrets.SERVER_HOST }} "
            echo '=== PM2 Status ===' &&
            pm2 status &&
            echo '' &&
            echo '=== Nginx Status ===' &&
            systemctl status nginx --no-pager | head -10 &&
            echo '' &&
            echo '=== Test Login API ===' &&
            curl -s -X POST http://localhost:3000/basic-api/login -H "Content-Type: application/json" -d '{"username":"admin","password":"admin123"}' | head -c 300 &&
            echo '' &&
            echo '' &&
            echo '=== Check Ports ===' &&
            netstat -tlnp | grep -E ':(80|443|3000)'
          "

      - name: Success Notification
        if: success()
        run: |
          echo "Deployment completed successfully!"
          echo "Admin Panel: https://dghs.gddogootech.com"
          echo "Agent Panel: https://agent.gddogootech.com"
          echo "Merchant Panel: https://merchant.gddogootech.com"
          echo "Member H5: https://member.gddogootech.com"

      - name: Failure Notification
        if: failure()
        run: |
          echo "Deployment failed! Please check logs."
          ssh root@${{ secrets.SERVER_HOST }} "pm2 logs --lines 50"
