name: Deploy to Cloud Server

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - '.cursor/**'
      - '.vscode/**'

jobs:
  deploy:
    name: Deploy All
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: '8'

      - name: Get dependencies
        run: pnpm install --no-frozen-lockfile

      # ─── 1. Build & Deploy Backend ───────────────────────────────────────────
      - name: Build Backend
        working-directory: ./server
        run: |
          cp .env.production .env
          npm install
          npm run build
        env:
          NODE_ENV: production

      - name: Upload Backend to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: 'server/*'
          target: /opt/dgkj-server/
          strip_components: 1
          overwrite: true

      - name: Setup Backend on Server
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            cd /opt/dgkj-server
            npm install --omit=dev
            npm run build
            npm install -g pm2
            pm2 delete dgkj-server || true
            pm2 start ecosystem.config.js || node dist/index.js &
            pm2 save
            pm2 list

      # ─── 2. Init Database ───────────────────────────────────────────────────
      - name: Initialize Database
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          command: |
            cd /opt/dgkj-server
            npx ts-node src/database/seed.ts
            echo "Database initialized"

      # ─── 3. Deploy Nginx Config ─────────────────────────────────────────────
      - name: Configure Nginx
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            cat > /etc/nginx/sites-enabled/dghs.gddogootech.com.conf << 'NGINX'
            server {
                listen 80;
                server_name dghs.gddogootech.com;
                return 301 https://$server_name$request_uri;
            }
            server {
                listen 443 ssl http2;
                server_name dghs.gddogootech.com;
                root /www/dgkj/admin;
                index index.html;

                ssl_certificate /etc/letsencrypt/live/dghs.gddogootech.com/fullchain.pem;
                ssl_certificate_key /etc/letsencrypt/live/dghs.gddogootech.com/privkey.pem;
                ssl_protocols TLSv1.2 TLSv1.3;
                ssl_prefer_server_ciphers off;

                gzip on;
                gzip_types text/plain text/css application/json application/javascript text/xml application/xml+rss text/javascript;

                location / {
                    try_files $uri $uri/ /index.html;
                }
                location /basic-api/ {
                    proxy_pass http://127.0.0.1:3000/basic-api/;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    proxy_set_header X-Real-IP $remote_addr;
                    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto $scheme;
                    proxy_set_header Connection '';
                    proxy_connect_timeout 60s;
                    proxy_send_timeout 60s;
                    proxy_read_timeout 60s;
                }
                location /api-docs/ {
                    proxy_pass http://127.0.0.1:3000/api-docs/;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                }
                location /upload/ {
                    proxy_pass http://127.0.0.1:3000/upload/;
                    proxy_http_version 1.1;
                    proxy_set_header Host $host;
                    client_max_body_size 100M;
                }
                access_log /var/log/nginx/dghs-admin.access.log;
                error_log /var/log/nginx/dghs-admin.error.log;
            }
            NGINX
            rm -f /etc/nginx/sites-enabled/default
            nginx -t && systemctl reload nginx && echo 'Nginx OK' || echo 'Nginx failed'

      # ─── 4. Build & Deploy Frontend ─────────────────────────────────────────
      - name: Build Frontend
        run: |
          sed -i 's|VITE_GLOB_API_URL=.*|VITE_GLOB_API_URL=https://dghs.gddogootech.com|' .env.production
          sed -i 's|VITE_USE_MOCK=.*|VITE_USE_MOCK=false|' .env.production
          cat .env.production
          pnpm build
        env:
          NODE_OPTIONS: --max_old_space_size=4096

      - name: Upload Frontend to Server
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          source: 'dist/*'
          target: /www/dgkj/admin/
          strip_components: 1
          overwrite: true

      # ─── 5. Verify ───────────────────────────────────────────────────────────
      - name: Verify Deployment
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          password: ${{ secrets.SERVER_PASSWORD }}
          port: 22
          script: |
            echo "=== PM2 Status ==="
            pm2 list
            echo ""
            echo "=== Backend API Test ==="
            curl -s -X POST http://localhost:3000/basic-api/auth/login \
              -H "Content-Type: application/json" \
              -d '{"username":"admin","password":"admin123"}' | head -c 500
            echo ""
            echo ""
            echo "=== Frontend Files ==="
            ls /www/dgkj/admin/ | head -10
